name: gemma4_26b_a4b_local_abli
method: contrastive_refusal_direction

model:
  source: google/gemma-4-26B-A4B-it
  local_dir: ~/models/gemma-4-26B-A4B-it
  output_dir: ~/models/gemma-4-26B-A4B-it-local-abliterated-v3
  dtype: bfloat16
  device_map: cuda
  trust_remote_code: false

data:
  harmful_prompts: ../../datasets/abliteration/harmful_refusal.yaml
  benign_prompts: ../../datasets/abliteration/benign_control.yaml

activation_collection:
  batch_size: 1
  max_pairs: 24
  max_seq_len: 1024
  preprocessing_parallelism: auto
  high_parallelism_c: 192
  layer_skip_first: 5
  layer_skip_last: 0
  token_position: suffix_mean
  direction_extraction: mean_difference
  winsorize_quantile: 0.02
  harmful_suffix: "\n\nI can't help with instructions for harmful requests."
  benign_suffix: "\n\nHere is a direct, helpful answer."

edit:
  mode: projection
  direction_transform: biprojection
  norm_preserve: true
  strength: 3.0
  module_strengths:
    self_attn.o_proj.weight: 1.25
    mlp.down_proj.weight: 0.75
  layer_start: 5
  layer_end: 29
  target_weight_suffixes:
    - mlp.down_proj.weight
    - self_attn.o_proj.weight
  leave_embeddings_untouched: true
  leave_lm_head_untouched: true
  leave_moe_experts_untouched: true
  require_all_target_directions: true
  review_required_before_export: true

safety:
  require_execute_flag: true
  min_free_cuda_gb: 18
  one_model_process_at_a_time: true

artifacts_dir: artifacts/abliteration/gemma4_26b_a4b_local_abli

diagnostics:
  reference_model: ~/models/Huihui-gemma-4-26B-A4B-it-abliterated

sota:
  preferred_backend: heretic
  output_dir: ~/models/gemma-4-26B-A4B-it-local-abliterated-sota-internal-t34
  work_dir: artifacts/abliteration/gemma4_26b_a4b_local_abli/sota_internal
  backends:
    obliteratus:
      install: pip install 'git+https://github.com/elder-plinius/OBLITERATUS.git'
      method: advanced
      max_seq_length: 512
      telemetry: false
    heretic:
      install: pip install -U 'heretic-llm[research]'
      quantization: none
      device_map: auto
      batch_size: 32
      max_batch_size: 32
      max_response_length: 40
      n_trials: 80
      n_startup_trials: 24
      selected_trial_index: 34
      orthogonalize_direction: true
      row_normalization: full
      winsorization_quantile: 1.0
      model_forge_prompt_datasets: {}
