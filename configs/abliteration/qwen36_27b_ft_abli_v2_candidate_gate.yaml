        variant: local_ft_abli_source_tethered_obliteratus_streaming_v30
        config: configs/abliteration/qwen36_27b_ft_abli_v2_source_tethered_obliteratus_streaming_v30.yaml
        output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-source-tethered-obliteratus-streaming-v30
        eval_suffix: qwen36_27b_local_ft_abli_source_tethered_obliteratus_streaming_v30_targeted_gate_t3
        blocker: V30 loaded the 851-weight Qwen checkpoint, then exceeded the 5% host MemAvailable floor before export; stopped at about 4.6 GiB available host RAM with no output directory
        export_env:
          MODEL_FORGE_OBLITERATUS_DOCKER_MEMORY_GB: 100
          MODEL_FORGE_OBLITERATUS_SHM_SIZE: 32g
        hypothesis: >
          V24's source-tethered OBLITERATUS method was not behaviorally
