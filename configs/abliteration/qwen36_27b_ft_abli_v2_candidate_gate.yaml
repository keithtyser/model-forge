        implementation_next:
          - do not rerun V29 unchanged; the patch fixed the Abliterix vector-shape failure, but the objective only reduced the 12/20 baseline to 8/20 at best
          - keep the analyzer improvement that infers baseline refusals from Abliterix's refusal-ratio objective values
          - next attempt must use a materially stronger no-refusal objective, such as response-opening conditioned vectors with direct refusal phrase scoring, streamed/source-tethered OBLITERATUS, or an SAE/activation feature edit aimed at the residual refusal-opening state
          - export only after a future search produces zero proxy refusals inside the KL gate, then register the selected checkpoint as a normal candidate and run the targeted three-trial model-forge gate before broad eval, NVFP4, upload, or promotion
      - name: source_tethered_obliteratus_streaming_v30
