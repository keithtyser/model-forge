        output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-abliterix-aeon-component-v27-selected
        produces_checkpoint: false
        eval_suffix: qwen36_27b_local_ft_abli_abliterix_aeon_component_v27_selected_targeted_gate_t3
        blocker: early stopped after three completed trials per node because every completed trial worsened the 12/20 baseline refusal count to 14-16/20
        hypothesis: >
          V26 kept Abliterix but searched the wrong component policy for Qwen3.6:
          SRA/full-normalized LoRA over the default component set could not move
          the proxy refusal count below 9/20. V27 keeps the same
          response-opening data objective but switches to the public Qwen3.6
          Abliterix component-policy shape: mean vectors, orthogonal/projected
          LoRA steering, winsorized directions, no weight normalization,
          disabled Q/K/V edits, unified output projection emphasis, and a
          smaller MLP down-projection band. Treat the public constants as
          starting ranges, not promotion evidence.
        implementation_next:
          - do not continue V27 or run abliterix-export; the first three completed trials on both Sparks all worsened the proxy refusal count
          - keep the useful implementation signal: disabled Q/K/V worked and Abliterix exposed only attn.o_proj plus mlp.down_proj as steerable components
          - next attempt should change refusal/harmfulness sign handling instead of repeating ablate_harmfulness_direction=false
