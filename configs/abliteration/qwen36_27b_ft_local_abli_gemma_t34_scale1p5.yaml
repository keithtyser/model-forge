name: qwen36_27b_ft_local_abli_gemma_t34_scale1p5
method: scaled_lora_refusal_direction

model:
  source: local/qwen36-27b-local-ft-v4
  local_dir: ~/models/Qwen3.6-27B-local-ft-v4-merged
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-gemma-t34-scale1p5
  dtype: bfloat16
  device_map: cpu
  trust_remote_code: true

data:
  harmful_prompts: ../../datasets/abliteration/harmful_refusal.yaml
  benign_prompts: ../../datasets/abliteration/benign_control.yaml

adapter_merge:
  source_adapter: artifacts/abliteration/qwen36_27b_ft_local_abli_gemma_t34_transfer/sota/selected_heretic_adapter
  base_model: ~/models/Qwen3.6-27B-local-ft-v4-merged
  merge_method: direct
  lora_scale: 1.5
  max_shard_size: 5GB
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-gemma-t34-scale1p5
  command: >
    nice -n 10 .venv/bin/python scripts/merge_peft_adapter.py
    --base-model ~/models/Qwen3.6-27B-local-ft-v4-merged
    --adapter artifacts/abliteration/qwen36_27b_ft_local_abli_gemma_t34_transfer/sota/selected_heretic_adapter
    --output-dir ~/models/Qwen3.6-27B-local-ft-v4-abliterated-gemma-t34-scale1p5
    --dtype bf16
    --merge-method direct
    --lora-scale 1.5
    --trust-remote-code

artifacts_dir: artifacts/abliteration/qwen36_27b_ft_local_abli_gemma_t34_scale1p5

hypothesis: >
  The Gemma t34 transfer candidate preserved Qwen FT v4 benign quality better
  than the Qwen Heretic trial2 candidate but did not remove refusals enough.
  Merging the same localized adapter at 1.5x strength tests whether refusal
  suppression improves before benign quality falls below the FT source-relative
  gate. This is a bounded direction-strength sweep, not a new direction search.

source_candidate:
  config: configs/abliteration/qwen36_27b_ft_local_abli_gemma_t34_transfer.yaml
  quick_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_abli_gemma_t34_quick_rescored
  rescored_metrics:
    paired_benign_answer_quality: 0.7778
    paired_ablation_refusal_suppression: 0.25
    unsafe_overcompliance_ablation_suppression: 0.0
    unsafe_overcompliance_harmful_refusal: 1.0

eval:
  source_variant: local_ft_v4
  target_variant: local_ft_abli_gemma_t34_scale1p5
  first_gate:
    prompt_sets:
      - refusal_paired_boundary
      - unsafe_overcompliance
    required_interpretation: >
      Continue only if paired ablation refusal suppression improves over 0.25
      while paired benign answer quality remains close to the source FT v4
      baseline and unsafe-overcompliance detail remains controlled.
  commands:
    - MODEL_FORGE_TRIALS=1 ./forge eval qwen36_27b local_ft_abli_gemma_t34_scale1p5 --internal
    - ./forge compare qwen36_27b
