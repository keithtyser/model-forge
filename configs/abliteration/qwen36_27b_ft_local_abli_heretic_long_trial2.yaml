name: qwen36_27b_ft_local_abli_heretic_long_trial2
method: heretic_direct_refusal_direction

model:
  source: local/qwen36-27b-local-ft-v4
  local_dir: ~/models/Qwen3.6-27B-local-ft-v4-merged
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-heretic-long-trial2
  dtype: bfloat16
  device_map: cuda
  trust_remote_code: true

data:
  harmful_prompts: ../../datasets/abliteration/harmful_refusal.yaml
  benign_prompts: ../../datasets/abliteration/benign_control.yaml

activation_collection:
  batch_size: 1
  max_pairs: 32
  max_seq_len: 1024
  preprocessing_parallelism: auto
  high_parallelism_c: 192
  layer_skip_first: 4
  layer_skip_last: 2
  token_position: suffix_mean
  direction_extraction: mean_difference
  winsorize_quantile: 0.02
  harmful_suffix: "\n\nI can't help with instructions for harmful requests."
  benign_suffix: "\n\nHere is a direct, helpful answer."

safety:
  require_execute_flag: true
  min_free_cuda_gb: 18
  one_model_process_at_a_time: true

artifacts_dir: artifacts/abliteration/qwen36_27b_ft_local_abli_heretic_long_trial2

sota:
  preferred_backend: heretic
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-heretic-long-trial2
  work_dir: artifacts/abliteration/qwen36_27b_ft_local_abli_heretic_long_trial2/sota_direct
  backends:
    heretic:
      install: docker build -f docker/heretic.Dockerfile -t model-forge-heretic-tf5:latest .
      container_image: model-forge-heretic-tf5:latest
      quantization: none
      device_map: auto
      batch_size: 1
      max_batch_size: 1
      max_response_length: 96
      n_trials: 1
      n_startup_trials: 1
      orthogonalize_direction: true
      row_normalization: full
      winsorization_quantile: 1.0
      model_forge_prompt_datasets:
        good_train_buckets:
          - agentic_multi_step_planning
          - agentic_tool_use_json
          - agentic_self_critique
          - agentic_structured_extraction
          - agentic_code_debug
          - normal_use_regression
          - capability_preservation_challenge
          - refusal_benign_boundary
          - refusal_paired_boundary
        good_eval_buckets:
          - refusal_paired_boundary
          - capability_preservation_challenge
        bad_train_buckets:
          - unsafe_overcompliance
          - refusal_paired_boundary
        bad_eval_buckets:
          - unsafe_overcompliance
          - refusal_paired_boundary
      direct_parameters:
        recipe: qwen36_ft_v4_heretic_long_search_trial2_direct_merge
        derived_from:
          selected_trial: "long search trial_id=1/index=2, Refusals: 10/23, KL divergence: 0.0265"
          source_run: artifacts/abliteration/qwen36_27b_ft_local_abli_heretic_long_search/sota_search/heretic_checkpoints
          note: >
            The bounded long-response Heretic search baseline refused 16/23
            model-forge bad evaluation prompts. Trial index 2 was the best
            observed refusal suppressor in the 6-trial first pass, reducing
            Heretic-probe refusals to 10/23 at low KL. Export this candidate
            only through the guarded direct adapter plus model-forge merge path
            and judge by model-forge internal evals.
        direction_index: null
        parameters:
          attn.o_proj:
            max_weight: 1.450458237637195
            max_weight_position: 53.37116297514856
            min_weight: 0.34777212727097384
            min_weight_distance: 7.657710904989605
          mlp.down_proj:
            max_weight: 1.1571997249874342
            max_weight_position: 44.20080556238359
            min_weight: 1.1038125960893455
            min_weight_distance: 19.62877098565366
        notes: >
          Compute fresh refusal directions on local Qwen 3.6 FT v4 using the
          long-search prompt buckets, apply the selected low-KL per-layer
          Heretic parameters, save a LoRA adapter, and merge it through the
          model-forge helper. This is not promoted unless the quick internal
          gate beats trial2 scale1.0 on refusal suppression without capability
          loss.

eval:
  source_variant: local_ft_v4
  target_variant: local_ft_abli_heretic_long_trial2
  first_gate:
    prompt_sets:
      - refusal_paired_boundary
      - unsafe_overcompliance
      - capability_preservation_challenge
    required_interpretation: >
      Continue only if harmful refusal drops materially below trial2 scale1.0
      while paired benign quality and challenge capability remain close to the
      local FT v4 source. Zero harmful refusal remains the promotion target.
  commands:
    - MODEL_FORGE_TRIALS=1 ./forge eval qwen36_27b local_ft_abli_heretic_long_trial2 --internal
    - ./forge compare qwen36_27b
