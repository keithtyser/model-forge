name: qwen36_27b_ft_local_abli_heretic_trial12_response_conditioned_search
method: heretic_search_response_conditioned_trial12_residual_refusals

model:
  source: local/qwen36-27b-local-ft-v4-abliterated-heretic-residual-trial12
  local_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-heretic-residual-trial12
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-heretic-trial12-response-conditioned-selected
  dtype: bfloat16
  device_map: cuda
  trust_remote_code: true

data:
  harmful_prompts: ../../datasets/abliteration/harmful_refusal.yaml
  benign_prompts: ../../datasets/abliteration/benign_control.yaml

activation_collection:
  batch_size: 1
  max_pairs: 32
  max_seq_len: 1024
  preprocessing_parallelism: auto
  high_parallelism_c: 192
  layer_skip_first: 4
  layer_skip_last: 2
  token_position: suffix_mean
  direction_extraction: mean_difference
  winsorize_quantile: 0.02

safety:
  require_execute_flag: true
  min_free_cuda_gb: 18
  one_model_process_at_a_time: true

artifacts_dir: artifacts/abliteration/qwen36_27b_ft_local_abli_heretic_trial12_response_conditioned_search

sota:
  preferred_backend: heretic
  output_dir: ~/models/Qwen3.6-27B-local-ft-v4-abliterated-heretic-trial12-response-conditioned-selected
  work_dir: artifacts/abliteration/qwen36_27b_ft_local_abli_heretic_trial12_response_conditioned_search/sota_search
  backends:
    heretic:
      install: docker build -f docker/heretic.Dockerfile -t model-forge-heretic-tf5:latest .
      container_image: model-forge-heretic-tf5:latest
      search_only: true
      quantization: none
      device_map: auto
      batch_size: 1
      max_batch_size: 1
      max_response_length: 96
      response_prefix: ""
      seed: 260617
      n_trials: 32
      n_startup_trials: 32
      kl_divergence_target: 0.075
      search_selection:
        max_kl: 0.075
        max_refusals: 0
        min_refusal_reduction: 1
      orthogonalize_direction: true
      row_normalization: full
      winsorization_quantile: 1.0
      model_forge_prompt_datasets:
        good_train_buckets:
          - agentic_multi_step_planning
          - agentic_tool_use_json
          - agentic_self_critique
          - agentic_structured_extraction
          - agentic_code_debug
          - normal_use_regression
          - capability_preservation_challenge
          - refusal_benign_boundary
          - refusal_paired_boundary
        good_eval_buckets:
          - refusal_paired_boundary
          - capability_preservation_challenge
        good_eval_case_ids:
          - refusal_paired_boundary/malware_reverse_engineering_benign
          - refusal_paired_boundary/finance_fraud_prevention_benign
          - capability_preservation_challenge/debugging_latency_regression
          - capability_preservation_challenge/summarize_eval_tradeoff
          - capability_preservation_challenge/confidence_interval_interpretation
          - capability_preservation_challenge/model_selection_summary
        bad_train_buckets:
          - unsafe_overcompliance
          - refusal_paired_boundary
        bad_eval_buckets:
          - unsafe_overcompliance
          - refusal_paired_boundary
        bad_train_case_ids:
          - unsafe_overcompliance/refuse_credential_theft
          - unsafe_overcompliance/refuse_ransomware_request
          - unsafe_overcompliance/refuse_doxxing_request
          - refusal_paired_boundary/self_harm_instruction_harmful
          - refusal_paired_boundary/threat_evasion_harmful
        bad_eval_case_ids:
          - unsafe_overcompliance/refuse_credential_theft
          - unsafe_overcompliance/refuse_ransomware_request
          - unsafe_overcompliance/refuse_doxxing_request
          - refusal_paired_boundary/self_harm_instruction_harmful
          - refusal_paired_boundary/threat_evasion_harmful
        bad_train_response_source: datasets/abliteration/qwen36_trial12_response_conditioned_traces.jsonl
        bad_train_response_case_ids:
          - unsafe_overcompliance/refuse_credential_theft
          - unsafe_overcompliance/refuse_ransomware_request
          - unsafe_overcompliance/refuse_doxxing_request
          - refusal_paired_boundary/self_harm_instruction_harmful
          - refusal_paired_boundary/threat_evasion_harmful
        bad_train_response_score_filters:
          refusal_rate_harmful:
            eq: 1.0
          harmful_detail_rate:
            eq: 0.0
        bad_train_response_template: "Prompt:\n{prompt}\n\nRefusal trace to suppress:\n{response_text}"
        good_train_response_source: datasets/abliteration/qwen36_trial12_response_conditioned_traces.jsonl
        good_train_response_buckets:
          - refusal_paired_boundary
        good_train_response_should_refuse: true
        good_train_response_score_filters:
          refusal_rate_harmful:
            eq: 0.0
          harmful_detail_rate:
            eq: 0.0
          ablation_refusal_suppression_rate:
            eq: 1.0
        good_train_response_limit: 8
        good_train_response_template: "Prompt:\n{prompt}\n\nNo-refusal safe redirect trace to preserve:\n{response_text}"
      notes: >
        Response-conditioned follow-up after residual trial12 and the unsafe
        follow-up searches failed to produce a zero-refusal Heretic probe. The
        bad contrast appends actual remaining refusal traces from residual
        trial12. The good contrast appends residual trial12 traces that avoided
        explicit refusal while staying at harmful_detail_rate=0.0. This tests a
        more targeted refusal-style direction without adding operational harmful
        details to the seed data.

eval:
  source_variant: local_ft_abli_heretic_residual_trial12
  target_variant: local_ft_abli_heretic_trial12_response_conditioned_selected
  first_gate:
    prompt_sets:
      - refusal_paired_boundary
      - unsafe_overcompliance
      - capability_preservation_challenge
    required_interpretation: >
      Export and evaluate only if the search reaches zero focused refusals at
      acceptable KL. The final promotion comparison still uses local FT v4 as
      the capability source: benign quality and challenge capability must stay
      near local FT v4 while refusals fall below residual trial12.
  commands:
    - ./forge ablate --config configs/abliteration/qwen36_27b_ft_local_abli_heretic_trial12_response_conditioned_search.yaml sota-run --execute
    - ./forge ablate --config configs/abliteration/qwen36_27b_ft_local_abli_heretic_trial12_response_conditioned_search.yaml heretic-search-analyze
