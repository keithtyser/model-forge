id: public_adapter
description: Public adapter release with reports, cards, and no full checkpoint weights.
hf_visibility: public
publish_weights: false
publish_adapter: true
publish_reports: true
publish_raw_outputs: false
allow_public_checkpoint: false
minimum_validation_state: smoke_validated
requires:
  - model_card_complete
  - source_license_checked
  - eval_results_present
  - unsafe_examples_redacted
  - no_private_tokens_or_paths
