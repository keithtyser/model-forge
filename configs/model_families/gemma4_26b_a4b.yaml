  local_ft_nvfp4_modelopt:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: model-forge-quantized/gemma4_26b_a4b/local_ft_nvfp4_modelopt
    served_model_name: model-forge/gemma4-26b-a4b-local-ft-nvfp4-modelopt
    base_variant: local_ft
    quantization: nvfp4
    downloadable: false
  local_abli_sota_nvfp4_modelopt:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: model-forge-quantized/gemma4_26b_a4b/local_abli_sota_nvfp4_modelopt
    served_model_name: model-forge/gemma4-26b-a4b-local-abli-sota-nvfp4-modelopt
    base_variant: local_abli_sota
    quantization: nvfp4
    downloadable: false
  ft_local_abli_sota_internal_r7_selected_t34_transfer_nvfp4_modelopt:
