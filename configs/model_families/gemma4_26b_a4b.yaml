name: gemma4_26b_a4b
display_name: Gemma 4 26B-A4B

models_dir_env: MODEL_FORGE_MODELS_DIR
default_models_dir: ~/models

architecture:
  family: gemma
  parameter_scale: 26b_a4b
  tokenizer_family: gemma4
  chat_template:
    tool_call_parser: gemma4
    reasoning_parser: gemma4
  context_length: 32768
  target_discovery:
    inspect_before_training_or_ablation: true
    common_attention_patterns:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    common_mlp_patterns:
      - gate_proj
      - up_proj
      - down_proj
    edit_exclusion_patterns:
      - embed_tokens
      - lm_head
      - router
      - expert
    router_or_expert_policy: exclude_router_and_experts_by_default

variants:
  base:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it
    served_model_name: google/gemma-4-26B-A4B-it
  ft:
    repo_id: Jackrong/Gemopus-4-26B-A4B-it
    local_dir: Gemopus-4-26B-A4B-it
    served_model_name: Jackrong/Gemopus-4-26B-A4B-it
  local_ft:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it-local-ft-v0
    served_model_name: local/gemma-4-26B-A4B-it-local-ft-v0
    adapter: true
    base_variant: base
    lora_rank: 64
    merged_local_dir: gemma-4-26B-A4B-it-local-ft-v0-merged
    serve_strategy: merged
    downloadable: false
  abli:
    repo_id: huihui-ai/Huihui-gemma-4-26B-A4B-it-abliterated
    local_dir: Huihui-gemma-4-26B-A4B-it-abliterated
    served_model_name: huihui-ai/Huihui-gemma-4-26B-A4B-it-abliterated
    base_variant: base
  local_abli:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it-local-abliterated-v3
    served_model_name: local/gemma-4-26B-A4B-it-abliterated-v3
    base_variant: base
    downloadable: false
  local_abli_sota:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it-local-abliterated-sota
    served_model_name: local/gemma-4-26B-A4B-it-abliterated-sota
    base_variant: base
    downloadable: false
  base_fp8_runtime:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it
    served_model_name: model-forge/gemma4-26b-a4b-base-fp8-runtime
    base_variant: base
    quantization: fp8_runtime
    downloadable: false
  base_nvfp4_blackwell_runtime:
    repo_id: nvidia/Gemma-4-26B-A4B-NVFP4
    local_dir: Gemma-4-26B-A4B-NVFP4
    served_model_name: model-forge/gemma4-26b-a4b-base-nvfp4-blackwell
    base_variant: base
    quantization: nvfp4
    downloadable: true
  ft_local_abli_sota_internal_r7_selected_t34_transfer:
    repo_id: Jackrong/Gemopus-4-26B-A4B-it
    local_dir: Gemopus-4-26B-A4B-it-local-abliterated-sota-internal-r7-selected-t34-transfer
    served_model_name: local/Gemopus-4-26B-A4B-it-abliterated-sota-internal-r7-selected-t34-transfer
    base_variant: local_ft
    downloadable: false
  base_nvfp4_modelopt:
    repo_id: google/gemma-4-26B-A4B-it
