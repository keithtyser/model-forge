    local_dir: gemma-4-26B-A4B-it-local-abliterated-huihui-shaped-s33
    served_model_name: local/gemma-4-26B-A4B-it-abliterated-huihui-shaped-s33
    base_variant: base
    downloadable: false

serve:
  script: scripts/dgx_spark_serve_gemma4_26b_a4b.sh
  default_gpu_memory_utilization: "0.85"
  default_max_model_len: "32768"

eval:
  config: configs/experiments/gemma4_26b_a4b_v0.yaml
  artifact_config: configs/experiments/gemma4_26b_a4b_artifacts_v0.yaml
  output_root: results/gemma4_26b_a4b_v0/base
  run_prefix: gemma4_26b_a4b
  smoke_suffix: "{family}_{variant}_smoke"
  full_suffix: "{family}_{variant}_dgx_spark"
  artifact_suffix: "{family}_{variant}_artifacts_dgx_spark"

comparison:
  output_dir: reports/generated/gemma4_26b_a4b_comparison

external:
  default_tool: lm-eval
  default_tasks: ifeval
  output_root: reports/generated/gemma4_26b_a4b_external
