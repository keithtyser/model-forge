    local_dir: model-forge-quantized/gemma4_26b_a4b/ft_local_abli_sota_internal_r7_selected_t34_transfer_nvfp4_modelopt
    served_model_name: model-forge/gemopus-4-26b-a4b-local-ft-abli-r7-nvfp4-modelopt
    base_variant: ft_local_abli_sota_internal_r7_selected_t34_transfer
    quantization: nvfp4
    downloadable: false
  local_abli_huihui_like:
    repo_id: google/gemma-4-26B-A4B-it
    local_dir: gemma-4-26B-A4B-it-local-abliterated-huihui-like
    served_model_name: local/gemma-4-26B-A4B-it-abliterated-huihui-like
