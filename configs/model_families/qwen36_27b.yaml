name: qwen36_27b
display_name: Qwen 3.6 27B

models_dir_env: MODEL_FORGE_MODELS_DIR
default_models_dir: ~/models

architecture:
  family: qwen
  parameter_scale: 27b
  tokenizer_family: qwen3
  chat_template:
    default_chat_template_kwargs:
      enable_thinking: false
    reasoning_parser: qwen3
  context_length: 262144
  target_discovery:
    inspect_before_training_or_ablation: true
    common_attention_patterns:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    common_mlp_patterns:
      - gate_proj
      - up_proj
      - down_proj
    edit_exclusion_patterns:
      - embed_tokens
      - lm_head
      - router
      - expert
    router_or_expert_policy: inspect_model_config

variants:
  base:
    repo_id: Qwen/Qwen3.6-27B
    local_dir: Qwen3.6-27B
    served_model_name: Qwen/Qwen3.6-27B
  local_ft:
    repo_id: Qwen/Qwen3.6-27B
    local_dir: Qwen3.6-27B-local-ft-v1
    merged_local_dir: Qwen3.6-27B-local-ft-v1-merged
    served_model_name: local/qwen36-27b-local-ft-v1
    adapter: true
    base_variant: base
    lora_rank: 64
    downloadable: false
  local_ft_v2:
    repo_id: Qwen/Qwen3.6-27B
    local_dir: Qwen3.6-27B-local-ft-v2
