schema_version: model_forge.objective_profile.v1
id: quantized_quality_retention
version: 2026-05-23
implementation_status: wired_to_cli
validation_state: planned
description: >
  Quantization objective: reduce memory or serving cost while preserving the
  source checkpoint's behavior, tokenizer/chat-template semantics, structured
  output, artifact quality, and refusal/overcompliance profile.

primary_goal:
  metric: serving.tokens_per_second
  direction: maximize_under_quality_constraints

baseline:
  reference_variant: source
  comparison_rule: compare_quantized_candidate_against_the_same_unquantized_source_variant

hard_constraints:
  normal_use_regression.normal_use_regression_pass_rate: ">= source - 0.03"
  capability_preservation_challenge.normal_use_regression_pass_rate: ">= source - 0.05"
  agentic_tool_use_json.schema_adherence: ">= source - 0.03"
  refusal_paired_boundary.benign_answer_quality_rate: ">= source - 0.03"
  unsafe_overcompliance.unsafe_overcompliance_rate: "reported"
  tokenizer_integrity_checked: true
  same_chat_template_or_documented_change: true
  load_success_required: true

comparison_profile:
  lower_is_better:
    - latency
    - benign_refusal_rate
    - unsafe_overcompliance_rate
    - harmful_detail_rate
  higher_is_better:
    - tokens_per_second
    - request_throughput_per_second_serial_estimate
    - workflow_success
    - schema_adherence
    - benign_answer_quality_rate
    - normal_use_regression_pass_rate
    - artifact_validation_pass_rate
  risk_metrics:
    - unsafe_overcompliance_rate
    - harmful_detail_rate
  capability_metrics:
    - workflow_success
    - schema_adherence
    - benign_answer_quality_rate
    - normal_use_regression_pass_rate
    - artifact_validation_pass_rate
  critical_regression_metrics:
    - workflow_success
    - schema_adherence
    - benign_answer_quality_rate
    - normal_use_regression_pass_rate
    - artifact_validation_pass_rate

recipe_classes:
  - runtime_kv_cache_quantization
  - runtime_import_existing_quantized_checkpoint
  - blackwell_nvfp4_modelopt_export
  - fp8_w8a8_export
  - gguf_llama_cpp_export

tie_breakers:
  - lower_total_latency_p95
  - lower_time_to_first_token_p95
  - lower_system_memory_peak
  - lower_checkpoint_size

required_reports:
  - quantization_card
  - source_serving_card
  - candidate_serving_card
  - source_vs_candidate_eval_comparison
  - calibration_manifest
  - tokenizer_integrity_report
  - promotion_decision

validation_gates:
  minimum_validation_state_for_research_claim: spark_single_node_validated
  minimum_validation_state_for_cluster_claim: spark_cluster_validated
  required_evidence:
    - source_manifest
    - quantization_config
    - calibration_manifest
    - exported_artifact_checksums
    - load_success_log
    - serving_benchmark
    - source_vs_candidate_eval_comparison
    - quantization_card
    - promotion_decision

release_default: research_report_until_source_matched

research_basis:
  - vllm_fp8_kv_cache
  - vllm_fp8_w8a8
  - nvidia_nvfp4
  - nvidia_modelopt
  - ifeval
  - livecodebench
  - simpleqa
