name: serve_bench_core
description: >
  Generic OpenAI-compatible serving benchmark that covers the reusable workload
  definitions used by serving sweeps and report cards.

output_dir: reports/generated/serve_bench

backend:
  base_url: http://127.0.0.1:8000/v1
  base_url_env: MODEL_FORGE_BASE_URL
  model_env: MODEL_FORGE_MODEL
  api_key_env: MODEL_FORGE_API_KEY
  timeout_seconds: 180
  stream: true
  stream_include_usage: true

sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 192

system_prompt: >
  You are a concise assistant. Answer directly and preserve requested formats.

workload:
  concurrency: 1
  repetitions: 1
  files:
    - configs/serving/workloads/short_chat.yaml
    - configs/serving/workloads/long_prefill.yaml
    - configs/serving/workloads/decode_heavy.yaml
    - configs/serving/workloads/structured_json.yaml
    - configs/serving/workloads/artifact_generation.yaml
    - configs/serving/workloads/reused_prefix.yaml
    - configs/serving/workloads/refusal_primary.yaml
    - configs/serving/workloads/long_context_retrieval.yaml
