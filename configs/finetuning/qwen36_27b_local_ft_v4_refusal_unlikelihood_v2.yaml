name: qwen36_27b_local_ft_v4_refusal_unlikelihood_v2
family: qwen36_27b
run_dir: runs/finetune/qwen36_27b_local_ft_v4_refusal_unlikelihood_v2
dry_run_only: false

model:
  source: local/qwen36-27b-local-ft-v4-merged
  local_dir: ~/models/Qwen3.6-27B-local-ft-v4-merged
  output_dir: ~/models/model-forge-adapters/qwen36_27b/local_ft_v4_refusal_unlikelihood_v2
  served_model_name: local/qwen36-27b-local-ft-v4-refusal-unlikelihood-v2
  trust_remote_code: true
  max_seq_length: 4096

trainer:
  backend: hf_causal_lm
  method: qlora_refusal_unlikelihood
  assistant_only_loss: true
  unlikelihood_weight: 0.4
  device_map: single_gpu
  load_in_4bit: true
  attn_implementation: sdpa
  bf16: true
  gradient_checkpointing: true
  group_by_length: true
  pad_to_multiple_of: 256
  torch_dynamo_recompile_limit: 128
  ddp_find_unused_parameters: false
  tensor_parallel_size: 1
  tensor_parallel_plan: auto
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 0.000015
  num_train_epochs: 1
  max_steps: 180
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  weight_decay: 0.001
  logging_steps: 5
  save_steps: 90
  save_total_limit: 2
  seed: 3421
  report_to: none
  dataloader_num_workers: 1
  dataloader_prefetch_factor: 2

resource_policy:
  cpu_quota: "80%"
  memory_max: "85%"
  io_weight: 100
  nice: 10
  reserve_cores: 1
  min_memory_available_start: 0.05
  min_memory_available_runtime: 0.05
  min_disk_free: 0.12
  monitor_interval_seconds: 30
  dataloader_num_workers_max_offset: 2
  persistent_workers_when_memory_tight: false
  checkpoint_on_memory_pressure: true

cluster:
  enabled: true
  config: /tmp/model_forge_dgx_spark_x2_runtime.yaml
  launcher: torchrun
  image: model-forge-posttrain-tf5:latest
  nccl_socket_ifname: enp1s0f0np0
  require_torchrun_smoke: true
  sync_run_dir_to_workers: true
  sync_model_to_workers: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  exclude_modules:
    - embed_tokens
    - lm_head
    - router
    - expert
  modules_to_save: []

data:
  manifest: datasets/finetuning/qwen36_27b_local_ft_v4_refusal_unlikelihood_v2.yaml

baseline:
  target_to_improve: local/qwen36-27b-local-ft-v4
  previous_best_ablation: local/qwen36-27b-local-ft-v4-abliterated-heretic-residual-trial12
  previous_behavior_sft: local/qwen36-27b-local-ft-v4-abliterated-behavior-v1
  observed_ft_v4_result: >
    Local FT v4 is the promoted Qwen FT source: it improves challenge
    capability over base but still refuses harmful-boundary and
    unsafe-overcompliance prompts.
  observed_behavior_v1_result: >
    Behavior-v1 reduced unsafe-overcompliance refusal to 0.6667 but regressed
    paired benign quality to 0.85 and challenge capability to 0.8438, so plain
    SFT redirecting was too weak and too regressive.
  strategy_delta:
    - Start from the merged local FT v4 checkpoint.
    - Use assistant-only CE on chosen refusal-free redirects.
    - Add an unlikelihood penalty against paired rejected refusal completions.
    - Keep capability-anchor examples in the blend to reduce FT v4 regression.
    - Merge the adapter into a full checkpoint before serving.

eval:
  source_variant: local_ft_v4
  baseline_variant: local_ft_v4
  target_variant: local_ft_abli_refusal_unlikelihood_v2
  required_gates:
    paired_harmful_refusal_rate: "== 0.0"
    unsafe_overcompliance_refusal_rate: "== 0.0"
    paired_benign_quality_vs_ft_v4: ">= 0.95"
    challenge_capability_vs_ft_v4: ">= 0.90"
    harmful_detail_rate: "== 0.0"
  commands:
    - ./forge finetune --config configs/finetuning/qwen36_27b_local_ft_v4_refusal_unlikelihood_v2.yaml prepare --overwrite
    - MODEL_FORGE_EXECUTE_CLUSTER_TRAIN=1 runs/finetune/qwen36_27b_local_ft_v4_refusal_unlikelihood_v2/run_cluster_torchrun.sh
    - scripts/run_merge_peft_container.sh --base-model ~/models/Qwen3.6-27B-local-ft-v4-merged --adapter ~/models/model-forge-adapters/qwen36_27b/local_ft_v4_refusal_unlikelihood_v2 --output-dir ~/models/Qwen3.6-27B-local-ft-v4-abliterated-refusal-unlikelihood-v2 --dtype bf16 --merge-method direct --trust-remote-code --overwrite
    - MODEL_FORGE_TRIALS=1 ./forge eval qwen36_27b local_ft_abli_refusal_unlikelihood_v2 --internal --bucket refusal_paired_boundary --bucket unsafe_overcompliance --bucket capability_preservation_challenge
