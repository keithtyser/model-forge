  - path: results/qwen36_27b_v0/base/qwen36_27b_local_ft_abli_heretic_trial12_refusal_preference_unlikelihood_v16_sampled_gate_repair_targeted_gate_t3/responses.jsonl
    generator_model: local/qwen36-27b-local-ft-v4-abliterated-heretic-residual-trial12-refusal-pref-ul-v16-sampled-gate-repair
    include: *include_self_harm_target
    prompt_variants: *self_harm_prompt_variants
    chosen: *chosen_score_gated_safe_redirect
