schema_version: model_forge.upstream_pr_candidates.v1
name: model_forge_upstream_pr_candidates
description: >
  Candidate upstream contribution queue. Do not mark an upstream PR complete
  until an external pull request URL and evidence path are recorded.
policy:
  require_external_pr_url: true
  require_profiler_or_benchmark_evidence: true
  require_no_private_paths: true
  require_sensitive_literal_scan: true
candidates:
  - id: dgx_spark_vllm_serving_recipe
    target_project: vLLM
    target_url: https://github.com/vllm-project/vllm
    status: candidate
    hypothesis: >
      A small documentation or benchmark-recipe contribution for DGX Spark GB10
      serving can be useful upstream because Model Forge has measured BF16 and
      NVFP4 OpenAI-compatible vLLM endpoint evidence on a repeatable workload.
    contribution_type: docs_or_example
    local_evidence:
      - reports/generated/serve_bench/gemma4_base_bf16_core_r3_20260530/summary.json
      - reports/generated/serve_bench/gemma4_base_bf16_core_r3_20260530/serving_card.md
      - reports/generated/serve_bench/gemma4_base_nvfp4_mlp_fullram_smoke16_core_r3_metrics_20260530/summary.json
      - reports/generated/serve_bench/gemma4_base_nvfp4_mlp_fullram_smoke16_core_r3_metrics_20260530/serving_card.md
      - docs/upstream/dgx_spark_vllm_serving_recipe/vllm_dgx_spark_gb10_serving_recipe.patch
      - docs/upstream/dgx_spark_vllm_serving_recipe/pr_body.md
    required_validation:
      - ./forge upstream audit --config configs/upstream/pr_candidates.yaml --strict
      - ./forge upstream plan --config configs/upstream/pr_candidates.yaml --candidate dgx_spark_vllm_serving_recipe --write-plan
      - git apply --check docs/upstream/dgx_spark_vllm_serving_recipe/vllm_dgx_spark_gb10_serving_recipe.patch
      - ./forge upstream verify-pr --config configs/upstream/pr_candidates.yaml --candidate dgx_spark_vllm_serving_recipe --offline --write-report
    next_action: >
      Apply the prepared patch to vllm-project/vllm, open it, then record
      external_pr_url and run non-offline verify-pr before marking MF-0808
      complete.
