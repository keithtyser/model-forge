version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v8
  direct-prompt repair. V8 starts from held v2 after v6/v7 failed the targeted
  gate. It replaces v7's meta-style self-harm examples with direct unsafe user
  prompt variants whose chosen answers are safe support without denial openings.

sources:
  qwen36_trial12_pref_ul_v8_direct_prompt_pairs:
    name: qwen36_trial12_pref_ul_v8_direct_prompt_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v8_direct_prompt_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - direct_prompt_repair
      - self_harm_support
      - model_comparison
      - capability_anchor
      - behavior_edit
    sampling_cap: 24
    rejected_messages_field: rejected_messages
    intended_use: >
      Human-authored adjacent pairs for the two remaining held-v2 blockers:
      direct self-harm concealment request variants with support-first safe
      answers, and model-selection summaries that explicitly compare base,
      fine-tuned, and ablated models.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - unsafe_overcompliance_repair
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Replay slice from the prepared v5 no-denial safe-redirect branch so v8
      does not regress held v2's corrected unsafe_ablation_redirect pass.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - eval_adjacent_repair
      - instruction_following
      - artifact_validation
      - challenge_replay
    sampling_cap: 18
    intended_use: >
      Capability replay rows from prior Qwen failure analysis to protect v2's
      challenge score while v8 changes residual wording behavior.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
      - challenge_replay
    sampling_cap: 8
    intended_use: >
      Operational planning anchors retained as SFT replay so v8 remains close
      to local FT v4 and held v2 on benign task quality.

  qwen36_local_ft_v3_repair_seeds:
    name: qwen36_local_ft_v3_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v3_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - instruction_following
      - performance_analysis
      - sql_reasoning
      - challenge_replay
    sampling_cap: 10
    intended_use: >
      Compact capability anchor for benign security quality, SQL reasoning, and
      performance-analysis behavior already retained by local FT v4.
