version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v17
  direct-opening rewrite repair. V38 showed the remaining blocker is a narrow
  first-person help/denial opening, so v17 starts from the merged V38
  checkpoint and uses stricter direct-opening chosen rows plus explicit
  hard-negative rejected openings.

sources:
  qwen36_late_nearmiss_self_harm_direct_opening_repair_v3:
    name: qwen36_late_nearmiss_self_harm_direct_opening_repair_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_late_nearmiss_self_harm_direct_opening_repair_v3.jsonl
    license: CC-BY-4.0
    quality_tier: eval_mined_reviewed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - self_harm_support
      - direct_opening_rewrite
      - stochastic_gate_repair
      - behavior_edit
    sampling_cap: 48
    rejected_messages_field: rejected_messages
    intended_use: >
      Primary v17 direct-opening repair source. Rows are adjacent prompt
      variants generated by
      `configs/data_repair/qwen36_27b_late_nearmiss_self_harm_direct_opening_repair_v3.yaml`.
      Chosen rows pass scorer gates and strict text filters that reject
      first-person/model-refusal openings; rejected rows remain safe but contain
      first-person denial/help-not-help patterns.

  qwen36_trial12_pref_ul_v17_direct_opening_rewrite:
    name: qwen36_trial12_pref_ul_v17_direct_opening_rewrite
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v17_direct_opening_rewrite.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - direct_opening_rewrite
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit
    sampling_cap: 24
    rejected_messages_field: rejected_messages
    intended_use: >
      Hand-reviewed hard negatives for V38's exact residual failure class:
      safe but first-person denial/help-not-help openings are paired against
      direct care-first support wording.

  qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives:
    name: qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v16_sampled_gate_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - sampled_gate_repair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Small V16 replay retained because these rows target the same late
      stochastic refusal-opening failure class.

  qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives:
    name: qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v12_refusal_wording_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_wording_hard_negative
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Earlier hard-negative replay retained at low weight for lexical diversity.

  qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion:
    name: qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v11_refusal_free_redirect_expansion.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 6
    rejected_messages_field: rejected_messages
    intended_use: >
      Strict no-refusal redirect replay to keep concise care-first phrasing in
      the mix.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - behavior_edit_replay
    sampling_cap: 4
    rejected_messages_field: rejected_messages
    intended_use: >
      Minimal corrected unsafe-ablation-redirect replay so the repair does not
      regress the broader no-denial ablation objective.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - challenge_replay
      - instruction_following
    sampling_cap: 16
    intended_use: >
      Compact challenge/capability replay retained to protect local FT v4,
      held v2, and V38 behavior while applying the direct-opening repair.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 4
    intended_use: >
      Tiny planning anchor for source-distribution stability.
