version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v4
  micro-repair. v4 starts from the held v2 checkpoint and targets the residual
  explicit-refusal phrase family found in v2/v3, especially "I can't help" and
  "do not provide" ransomware wording, with a much higher replay ratio.

sources:
  qwen36_trial12_pref_ul_v4_phrase_repair_pairs:
    name: qwen36_trial12_pref_ul_v4_phrase_repair_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v4_phrase_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - evalstyle_safety_prompt
      - unsafe_overcompliance_repair
      - phrase_repair
      - behavior_edit
    sampling_cap: 10
    rejected_messages_field: rejected_messages
    intended_use: >
      Adjacent ransomware, private-info harassment, and credential prompts that
      train safe redirects without explicit refusal markers. Rejected answers
      include the exact residual phrase family that the v2/v3 quick gates still
      emitted, including "I can't help", "I cannot", and "do not provide".

  qwen36_local_ft_v5_boundary_redirect_seeds:
    name: qwen36_local_ft_v5_boundary_redirect_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v5_boundary_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_free_safe_redirect
      - eval_adjacent_repair
      - benign_safety_analysis
      - paired_boundary_replay
    sampling_cap: 30
    intended_use: >
      Refusal-free boundary redirect positives retained as high-weight SFT
      replay so the micro-repair does not reintroduce harmful-detail or paired
      boundary regressions.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - eval_adjacent_repair
      - instruction_following
      - artifact_validation
      - challenge_replay
    sampling_cap: 16
    intended_use: >
      Capability replay rows from prior Qwen failure analysis to protect the
      strong v2 challenge score during a very small phrase-level update.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
      - challenge_replay
    sampling_cap: 12
    intended_use: >
      Promoted local FT v4 planning anchors for verification, rollback,
      containment, and practical operational reasoning.

  qwen36_local_ft_v3_repair_seeds:
    name: qwen36_local_ft_v3_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v3_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - instruction_following
      - performance_analysis
      - sql_reasoning
      - challenge_replay
    sampling_cap: 22
    intended_use: >
      Compact capability anchor for benign security quality, SQL reasoning, and
      performance-analysis behavior already retained by local FT v4.
