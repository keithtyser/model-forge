version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v3
  sequential repair. The primary source targets the two unsafe-overcompliance
  prompts that v2 still answered with explicit refusal wording while retaining
  adjacent pairs and capability replay from earlier successful sources.

sources:
  qwen36_trial12_pref_ul_v3_unsafe_no_refusal_pairs:
    name: qwen36_trial12_pref_ul_v3_unsafe_no_refusal_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v3_unsafe_no_refusal.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - evalstyle_safety_prompt
      - unsafe_overcompliance_repair
      - behavior_edit
    sampling_cap: 16
    rejected_messages_field: rejected_messages
    intended_use: >
      Adjacent ransomware, private-info harassment, and credential prompts that
      preserve the eval-style "safety-aligned assistant" and "Refuse briefly"
      trigger while training chosen answers that redirect without explicit
      refusal wording or actionable harmful detail.

  qwen36_local_ft_v4_refusal_unlikelihood_v3_evalstyle_pairs:
    name: qwen36_local_ft_v4_refusal_unlikelihood_v3_evalstyle_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_refusal_unlikelihood_v3_evalstyle.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - evalstyle_safety_prompt
      - refusal_free_safe_redirect
      - behavior_edit
    sampling_cap: 12
    rejected_messages_field: rejected_messages
    intended_use: >
      Broader eval-style adjacent refusal pairs retained at low weight so the
      repair does not overfit only the ransomware and doxxing prompts.

  qwen36_heretic_trial12_refusal_unlikelihood_v1:
    name: qwen36_heretic_trial12_refusal_unlikelihood_v1
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_heretic_trial12_refusal_unlikelihood_v1.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - residual_refusal_case
      - refusal_free_safe_redirect
      - behavior_edit
    sampling_cap: 23
    rejected_messages_field: rejected_messages
    intended_use: >
      Residual trial12 adjacent pairs retained as a small replay source to
      preserve the v2 paired-boundary gains.

  qwen36_local_ft_v5_boundary_redirect_seeds:
    name: qwen36_local_ft_v5_boundary_redirect_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v5_boundary_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_free_safe_redirect
      - eval_adjacent_repair
      - benign_safety_analysis
    sampling_cap: 30
    intended_use: >
      Refusal-free boundary redirect positives retained as SFT replay to keep
      harmful-detail-free redirect style active.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - eval_adjacent_repair
      - instruction_following
      - artifact_validation
    sampling_cap: 16
    intended_use: >
      Capability replay rows from prior Qwen failure analysis to preserve the
      strong v2 challenge score.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 12
    intended_use: >
      Promoted local FT v4 planning anchors for verification, rollback,
      containment, and practical operational reasoning.

  qwen36_local_ft_v3_repair_seeds:
    name: qwen36_local_ft_v3_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v3_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - instruction_following
      - performance_analysis
      - sql_reasoning
    sampling_cap: 22
    intended_use: >
      Compact capability anchor for benign security quality, SQL reasoning, and
      performance-analysis behavior already retained by local FT v4.
