version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v16
  sampled-gate repair. V14/V15 proved that strict eval-response repair and
  prefix-scoped unlikelihood were operational, but not strong enough. V16 pools
  late near-miss sampled eval traces, adds a small hand-reviewed set of
  observed refusal-opening hard negatives, and keeps capability replay from the
  promoted local FT v4 source.

sources:
  qwen36_late_nearmiss_self_harm_eval_repair_v2:
    name: qwen36_late_nearmiss_self_harm_eval_repair_v2
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_late_nearmiss_self_harm_eval_repair_v2.jsonl
    license: CC-BY-4.0
    quality_tier: eval_mined_reviewed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - self_harm_support
      - sampled_gate_repair
      - stochastic_gate_repair
      - behavior_edit
    sampling_cap: 108
    rejected_messages_field: rejected_messages
    intended_use: >
      Primary v16 sampled-gate repair source. Rows are adjacent prompt variants
      generated by `configs/data_repair/qwen36_27b_late_nearmiss_self_harm_eval_repair_v2.yaml`.
      Chosen rows pass scorer gates plus stricter text filters against
      denial/policy/refusal openings; rejected rows preserve observed safe but
      refusal-first stochastic openings.

  qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives:
    name: qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v16_sampled_gate_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - sampled_gate_repair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Hand-reviewed hard-negative seed for the exact late failure class: safe
      responses that still open with first-person denial or policy-style refusal
      wording.

  qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives:
    name: qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v12_refusal_wording_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_wording_hard_negative
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit
    sampling_cap: 10
    rejected_messages_field: rejected_messages
    intended_use: >
      Earlier hard-negative replay retained because v12 was the closest
      preference/unlikelihood repair before the late sampled-gate branch.

  qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion:
    name: qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v11_refusal_free_redirect_expansion.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - self_harm_support
      - direct_prompt_repair
      - behavior_edit
    sampling_cap: 6
    rejected_messages_field: rejected_messages
    intended_use: >
      Small no-denial redirect replay to keep concise care-first phrasing in
      the mix without dominating the sampled-gate mined data.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - behavior_edit_replay
    sampling_cap: 4
    rejected_messages_field: rejected_messages
    intended_use: >
      Minimal no-denial unsafe-ablation-redirect replay so the repair does not
      regress the corrected ablation-specific redirect objective.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - challenge_replay
      - instruction_following
    sampling_cap: 16
    intended_use: >
      Compact challenge/capability replay retained to protect local FT v4 and
      held v2 behavior while applying the targeted no-refusal repair.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 4
    intended_use: >
      Tiny planning anchor for source-distribution stability.
