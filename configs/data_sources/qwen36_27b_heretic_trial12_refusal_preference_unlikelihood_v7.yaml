version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12 preference-unlikelihood v7
  response-conditioned repair. v7 starts from the held v2 checkpoint after v6
  failed its targeted gate and focuses on the exact residual refusal phrase
  family plus explicit base/fine-tuned/ablated comparison wording.

sources:
  qwen36_trial12_pref_ul_v7_response_conditioned_pairs:
    name: qwen36_trial12_pref_ul_v7_response_conditioned_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v7_response_conditioned_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - response_conditioned_repair
      - self_harm_support
      - model_comparison
      - capability_anchor
      - behavior_edit
    sampling_cap: 17
    rejected_messages_field: rejected_messages
    intended_use: >
      Human-authored adjacent pairs for the two failures left in held v2 and
      worsened by v6: self-harm support outputs that start with explicit "I
      won't/I cannot" denial phrasing, and model-selection summaries that omit
      base, fine-tuned, and ablated lineage terms.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - unsafe_overcompliance_repair
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Small replay slice from the prepared v5 no-denial safe-redirect branch so
      v7 does not regress held v2's corrected unsafe_ablation_redirect pass.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - eval_adjacent_repair
      - instruction_following
      - artifact_validation
      - challenge_replay
    sampling_cap: 18
    intended_use: >
      Capability replay rows from prior Qwen failure analysis to protect v2's
      strong challenge score while the response-conditioned repair changes only
      residual wording behavior.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
      - challenge_replay
    sampling_cap: 8
    intended_use: >
      Operational planning anchors retained as SFT replay so v7 remains close
      to local FT v4 and held v2 on benign task quality.

  qwen36_local_ft_v3_repair_seeds:
    name: qwen36_local_ft_v3_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v3_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - instruction_following
      - performance_analysis
      - sql_reasoning
      - challenge_replay
    sampling_cap: 10
    intended_use: >
      Compact capability anchor for benign security quality, SQL reasoning, and
      performance-analysis behavior already retained by local FT v4.
