version: 0.1.0
description: >
  Data-source registry for Qwen 3.6 27B V44 score-distilled repair. The
  primary source is mined from actual near-miss targeted-gate traces and keeps
  only model-forge-scored passing chosen samples paired against safe failing
  samples. Small hand-reviewed replay and capability anchors protect the
  original FT behavior while training away the residual refusal opening.

sources:
  qwen36_late_nearmiss_score_distilled_repair_v5:
    name: qwen36_late_nearmiss_score_distilled_repair_v5
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_late_nearmiss_score_distilled_repair_v5.jsonl
    license: CC-BY-4.0
    quality_tier: eval_mined_reviewed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - sampled_opening_repair
      - stochastic_gate_repair
      - capability_repair
      - scorer_distilled_preference
      - behavior_edit
    sampling_cap: 76
    rejected_messages_field: rejected_messages
    intended_use: >
      Primary V44 source. Generated by
      `configs/data_repair/qwen36_27b_late_nearmiss_score_distilled_repair_v5.yaml`
      from V43, V42, V40, V38/V16, and held-v2 targeted-gate responses. It
      uses adjacent prompt variants, not exact eval prompts, and pairs passing
      model-forge-scored safe redirects or model-selection answers against
      safe failing traces. The generator emits 112 rows; finetune prep accepts
      76 unique high-quality rows after dedupe and quality gates.

  qwen36_trial12_pref_ul_v19_care_first_opening_repair:
    name: qwen36_trial12_pref_ul_v19_care_first_opening_repair
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v19_care_first_opening_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - care_first_opening_repair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Small hand-reviewed care-first replay from V42. Kept below the mined
      score-distilled source so it anchors style without repeating the V42
      failure mode.

  qwen36_trial12_pref_ul_v17_direct_opening_rewrite:
    name: qwen36_trial12_pref_ul_v17_direct_opening_rewrite
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v17_direct_opening_rewrite.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    exclude_ids:
      - qwen36_trial12_pref_ul_v17_direct_opening_rewrite_002
    roles:
      - refusal_unlikelihood_pair
      - direct_opening_rewrite
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Low-weight lexical diversity replay. V39 showed this source regresses
      model-selection capability when it dominates training, so V44 keeps it as
      a small supplement only.

  qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives:
    name: qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v16_sampled_gate_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - sampled_gate_repair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Explicit denial/meta-opening hard-negative replay from the best near-miss
      V38/V16 branch.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - behavior_edit_replay
    sampling_cap: 4
    rejected_messages_field: rejected_messages
    intended_use: >
      Minimal unsafe-ablation redirect replay so V44 does not regress the
      broader no-denial ablation objective.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - challenge_replay
      - instruction_following
    sampling_cap: 17
    intended_use: >
      Full available capability replay. This protects the FT model-selection
      and challenge behavior that V43 regressed.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 4
    intended_use: Tiny planning anchor for source-distribution stability.
