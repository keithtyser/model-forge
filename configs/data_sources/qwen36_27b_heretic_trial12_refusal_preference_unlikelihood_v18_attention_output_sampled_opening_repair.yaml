version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B trial12
  preference-unlikelihood V18 / candidate V41 attention-output sampled-opening
  repair. V41 uses score-gated sampled near-miss rows, including fresh V40
  evidence, and keeps direct-opening hard negatives as a small replay rather
  than the primary objective.

sources:
  qwen36_late_nearmiss_self_harm_sampled_opening_repair_v4:
    name: qwen36_late_nearmiss_self_harm_sampled_opening_repair_v4
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_late_nearmiss_self_harm_sampled_opening_repair_v4.jsonl
    license: CC-BY-4.0
    quality_tier: eval_mined_reviewed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - self_harm_support
      - sampled_opening_repair
      - stochastic_gate_repair
      - behavior_edit
    sampling_cap: 84
    rejected_messages_field: rejected_messages
    intended_use: >
      Primary V41 source. Rows are adjacent prompt variants generated by
      `configs/data_repair/qwen36_27b_late_nearmiss_self_harm_sampled_opening_repair_v4.yaml`.
      Chosen rows pass model-forge no-refusal safe-redirect gates; rejected rows
      remain safe but contain refusal-opening wording. This source includes the
      fresh rejected V40 behavior as well as prior near-miss candidates.

  qwen36_trial12_pref_ul_v17_direct_opening_rewrite:
    name: qwen36_trial12_pref_ul_v17_direct_opening_rewrite
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v17_direct_opening_rewrite.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - direct_opening_rewrite
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 12
    rejected_messages_field: rejected_messages
    intended_use: >
      Small hard-negative replay from V39. Kept at low weight because V39's
      direct-opening objective regressed model_selection_summary when it
      dominated training.

  qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives:
    name: qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v16_sampled_gate_hard_negatives.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - sampled_gate_repair
      - refusal_free_safe_redirect
      - self_harm_support
      - behavior_edit_replay
    sampling_cap: 8
    rejected_messages_field: rejected_messages
    intended_use: >
      Small V38 hard-negative replay for explicit refusal-opening variants that
      the score-gated mined data may under-sample.

  qwen36_trial12_pref_ul_v5_ablation_redirect_pairs:
    name: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_trial12_pref_ul_v5_ablation_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - refusal_free_safe_redirect
      - ablation_unsafe_redirect
      - behavior_edit_replay
    sampling_cap: 4
    rejected_messages_field: rejected_messages
    intended_use: >
      Minimal corrected unsafe-ablation-redirect replay so V41 does not regress
      the broader no-denial ablation objective.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - challenge_replay
      - instruction_following
    sampling_cap: 24
    intended_use: >
      Capability replay deliberately weighted higher than V39 because V39
      regressed the model_selection_summary gate.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 4
    intended_use: >
      Tiny planning anchor for source-distribution stability.
