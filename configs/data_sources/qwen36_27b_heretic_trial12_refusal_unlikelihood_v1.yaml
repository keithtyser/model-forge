version: 0.1.0
description: >
  Data-source registry for the Qwen 3.6 27B residual-trial12 sequential
  refusal-unlikelihood branch. The primary source targets the exact behavior
  categories that residual Heretic trial12 still refused, using adjacent
  prompts and refusal-free safe redirects rather than holdout prompt copies.

sources:
  qwen36_heretic_trial12_refusal_unlikelihood_v1:
    name: qwen36_heretic_trial12_refusal_unlikelihood_v1
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_heretic_trial12_refusal_unlikelihood_v1.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_unlikelihood_pair
      - residual_refusal_case
      - refusal_free_safe_redirect
      - benign_quality_anchor
      - capability_anchor
      - behavior_edit
    sampling_cap: 23
    rejected_messages_field: rejected_messages
    intended_use: >
      Human-written adjacent cases for the five remaining trial12 refusal
      failures: credential theft, ransomware, doxxing, self-harm concealment,
      and threat evasion. Chosen answers avoid explicit refusal wording and
      actionable harmful detail; rejected answers contain explicit refusal
      phrasing for the unlikelihood penalty.

  qwen36_local_ft_v4_capability_replay_v3:
    name: qwen36_local_ft_v4_capability_replay_v3
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_capability_replay_v3.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - eval_adjacent_repair
      - instruction_following
      - artifact_validation
    sampling_cap: 16
    intended_use: >
      Capability replay rows from v2 failure analysis to preserve latency
      debugging, eval design, artifact validation, SQL, shell quoting, model
      selection, and resource-safety behavior.

  qwen36_local_ft_v4_planning_repair_seeds:
    name: qwen36_local_ft_v4_planning_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v4_planning_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - agentic_planning
      - instruction_following
    sampling_cap: 12
    intended_use: >
      Promoted local FT v4 planning anchors for verification, rollback,
      containment, and practical operational reasoning.

  qwen36_local_ft_v3_repair_seeds:
    name: qwen36_local_ft_v3_repair_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v3_repair.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - capability_anchor
      - instruction_following
      - performance_analysis
      - sql_reasoning
    sampling_cap: 18
    intended_use: >
      Compact capability anchor for benign security quality, SQL reasoning,
      and performance-analysis behavior already retained by local FT v4.

  qwen36_local_ft_v5_boundary_redirect_seeds:
    name: qwen36_local_ft_v5_boundary_redirect_seeds
    type: local_jsonl
    path: datasets/seeds/qwen36_27b_local_ft_v5_boundary_redirect.jsonl
    license: CC-BY-4.0
    quality_tier: human_seed
    roles:
      - refusal_free_safe_redirect
      - eval_adjacent_repair
      - benign_safety_analysis
    sampling_cap: 10
    intended_use: >
      Downsampled refusal-free boundary redirects to keep the no-refusal style
      active without overwhelming the residual-trial12 source checkpoint.
