schema_version: model_forge.quantization.v1
name: qwen36_27b_local_ft_v4_nvfp4_modelopt
description: >
  Self-quantize the validated Qwen 3.6 27B local FT v4 checkpoint to Blackwell
  NVFP4 with NVIDIA TensorRT Model Optimizer, then compare the quantized
  checkpoint against the same unquantized FT source. This config exists so the
  Qwen NVFP4/Blackwell path can be tested before the final FT-abli source is
  promotable.
family: qwen36_27b
source_variant: local_ft_v4
target_variant: local_ft_v4_nvfp4_modelopt
method: nvfp4
backend: modelopt
objective: quantized_quality_retention
hardware_profile: dgx_spark_x2

calibration:
  dataset: cnn_dailymail,wikipedia
  samples: 256,256
  seq_len: 2048
  batch_size: 4
  smoke_samples: 16,16
  smoke_seq_len: 1024
  production_samples: 1024,1024
  production_seq_len: 2048
  optional_gated_dataset: nvidia/Nemotron-Post-Training-Dataset-v2
  notes: >
    Use public calibration data for portability unless Nemotron post-training
    access is available. Smoke exports may set MODEL_FORGE_QUANT_CALIB_SIZE and
    MODEL_FORGE_QUANT_CALIB_SEQ, but promotion requires recording the exact
    calibration dataset revisions, sequence lengths, and sample counts used for
    the final export.

exclusions:
  apply_recommended_keep_patterns: true
  modules:
    - lm_head
    - embed_tokens
    - router
    - expert
    - vision
    - visual
    - multi_modal_projector

export:
  image: model-forge-modelopt-nvfp4:0.43.0
  dockerfile: docker/modelopt-nvfp4.Dockerfile
  base_image: vllm-node-tf5:latest
  modelopt_version: 0.43.0
  output_root: ~/models/model-forge-quantized/qwen36_27b
  output_subdir: "{target_variant}"
  start_if_memory_available_above_fraction: 0.05
  stop_if_memory_available_below_fraction: 0.05
  watchdog_poll_seconds: 2
  require_disk_free_fraction: 0.12
  systemd_scope:
    enabled: true
    user: true
    CPUQuota: "80%"
    MemoryMax: "90%"
    IOWeight: 100
  docker:
    cpus: 8
    omp_num_threads: 8
    memory_gb: 104
    memory_swap_gb: 104
    shm_size_gb: 32
    nice: 10
  ptq:
    strategy: qwen_text_modelopt
    script: scripts/quantization/qwen_text_modelopt.py
    qformat: nvfp4
    dataset: cnn_dailymail,wikipedia
    calib_size: 256,256
    calib_seq: 2048
    batch_size: 4
    tensor_parallel: 1
    pipeline_parallel: 1
    gpu_max_mem_percentage: 0.70
    kv_cache_qformat: fp8_cast
    low_memory_mode: true
    use_seq_device_map: true
    trust_remote_code: true
    skip_generate: true

runtime:
  served_model_name: model-forge/qwen36-27b-local-ft-v4-nvfp4-modelopt
  container: vllm-node-tf5
  host: 0.0.0.0
  port: 8019
  tensor_parallel: 2
  gpu_memory_utilization: 0.70
  max_model_len: 8192
  max_num_seqs: 4
  max_num_batched_tokens: 8192
  launch:
    spark_vllm_dir_env: MODEL_FORGE_SPARK_VLLM_DOCKER
    nodes_env: MODEL_FORGE_SPARK_CLUSTER_NODES
    container_name: model_forge_qwen36_local_ft_v4_nvfp4
    no_ray: true
    non_privileged: true
    mem_limit_gb: 110
    mem_swap_limit_gb: 120
    shm_size_gb: 32
  env:
    VLLM_NVFP4_GEMM_BACKEND: marlin
  vllm_flags:
    trust_remote_code: true
    quantization: modelopt
    kv_cache_dtype: fp8
    load_format: auto
    moe_backend: marlin

gates:
  nvfp4:
    min_output_speedup: 1.5
    min_decode_heavy_output_speedup: 1.5

matrix:
  workers_env: MODEL_FORGE_QUANT_WORKERS
  workers: local
  variants:
    - name: local_ft_v4_nvfp4_default
      source_variant: local_ft_v4
      target_variant: local_ft_v4_nvfp4_modelopt
      policy: default_nvfp4
      baseline_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_v4_dgx_spark
    - name: local_ft_v4_nvfp4_awq
      source_variant: local_ft_v4
      target_variant: local_ft_v4_nvfp4_awq_modelopt
      policy: awq_lite_nvfp4_low_memory_probe
      baseline_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_v4_dgx_spark
      export:
        ptq:
          qformat: nvfp4_awq
          calib_size: 64
          calib_seq: 1024
          batch_size: 1
          device_map: cuda:0
          reject_meta_tensors: true
      runtime:
        served_model_name: model-forge/qwen36-27b-local-ft-v4-nvfp4-awq-modelopt
        port: 8020
        launch:
          container_name: model_forge_qwen36_local_ft_v4_nvfp4_awq
    - name: local_ft_v4_nvfp4_w4a16
      source_variant: local_ft_v4
      target_variant: local_ft_v4_nvfp4_w4a16_modelopt
      policy: weight_only_nvfp4
      baseline_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_v4_dgx_spark
      export:
        ptq:
          qformat: nvfp4_w4a16
          calib_size: 64
          calib_seq: 1024
          batch_size: 1
          device_map: cuda:0
          reject_meta_tensors: true
      runtime:
        served_model_name: model-forge/qwen36-27b-local-ft-v4-nvfp4-w4a16-modelopt
        port: 8021
        launch:
          container_name: model_forge_qwen36_local_ft_v4_nvfp4_w4a16
    - name: local_ft_v4_nvfp4_mlp_only
      source_variant: local_ft_v4
      target_variant: local_ft_v4_nvfp4_mlp_only_modelopt
      policy: component_sensitivity_mlp_only_nvfp4
      baseline_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_v4_dgx_spark
      export:
        ptq:
          qformat: nvfp4
          calib_size: 64
          calib_seq: 1024
          batch_size: 1
          device_map: cuda:0
          reject_meta_tensors: true
          disable_patterns:
            - "*self_attn*"
            - "*linear_attn*"
      runtime:
        served_model_name: model-forge/qwen36-27b-local-ft-v4-nvfp4-mlp-only-modelopt
        port: 8022
        launch:
          container_name: model_forge_qwen36_local_ft_v4_nvfp4_mlp_only
    - name: local_ft_v4_nvfp4_attention_output_bf16
      source_variant: local_ft_v4
      target_variant: local_ft_v4_nvfp4_attention_output_bf16_modelopt
      policy: component_sensitivity_attention_output_bf16_nvfp4
      baseline_eval: results/qwen36_27b_v0/base/qwen36_27b_local_ft_v4_dgx_spark
      export:
        ptq:
          qformat: nvfp4
          calib_size: 64
          calib_seq: 1024
          batch_size: 1
          device_map: cuda:0
          reject_meta_tensors: true
          disable_patterns:
            - "*self_attn.o_proj*"
            - "*linear_attn.out_proj*"
      runtime:
        served_model_name: model-forge/qwen36-27b-local-ft-v4-nvfp4-attn-output-bf16-modelopt
        port: 8023
        launch:
          container_name: model_forge_qwen36_local_ft_v4_nvfp4_attn_output_bf16

outputs:
  reports_dir: reports/generated/quantization
  models_dir: ~/models/model-forge-quantized/qwen36_27b

evals:
  required:
    - ./forge quantize calibration-manifest qwen36_27b local_ft_v4 --config configs/quantization/qwen36_27b_local_ft_v4_nvfp4_modelopt.yaml --write-manifest
    - ./forge quantize export qwen36_27b local_ft_v4 --config configs/quantization/qwen36_27b_local_ft_v4_nvfp4_modelopt.yaml --execute
    - ./forge serve qwen36_27b local_ft_v4_nvfp4_modelopt
    - ./forge eval qwen36_27b local_ft_v4_nvfp4_modelopt --internal
    - ./forge bench serve --config configs/serving/serve_bench_core.yaml --model model-forge/qwen36-27b-local-ft-v4-nvfp4-modelopt --base-url http://127.0.0.1:8019/v1
    - ./forge quantize card --config configs/quantization/qwen36_27b_local_ft_v4_nvfp4_modelopt.yaml --source-serving-summary <source>/summary.json --candidate-serving-summary <candidate>/summary.json --source-serving-eval <source_eval> --candidate-serving-eval <candidate_eval> --run-id <run_id> --write-card
  card_metrics:
    - normal_use_regression.normal_use_regression_pass_rate
    - capability_preservation_challenge.normal_use_regression_pass_rate
    - agentic_tool_use_json.schema_adherence
    - agentic_tool_use_json.workflow_success
    - refusal_paired_boundary.benign_answer_quality_rate
    - refusal_paired_boundary.benign_refusal_rate
    - unsafe_overcompliance.unsafe_overcompliance_rate
    - overall.latency_seconds_median
