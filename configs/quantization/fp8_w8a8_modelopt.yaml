schema_version: model_forge.quantization.v1
name: fp8_w8a8_modelopt
description: >
  Generic NVIDIA TensorRT Model Optimizer FP8 W8A8 checkpoint-creation recipe.
  Pass a family and source variant at the CLI so the same pipeline can be used
  for Gemma, Qwen, Llama, Mistral, or future model families.
target_variant: "{source_variant}_fp8_w8a8_modelopt"
method: fp8_w8a8
backend: modelopt
objective: quantized_quality_retention
hardware_profile: dgx_spark_x2

calibration:
  dataset: cnn_dailymail,wikipedia
  samples: 64,64
  seq_len: 2048
  batch_size: 4
  smoke_samples: 16,16
  smoke_seq_len: 1024
  production_samples: 512,512
  production_seq_len: 2048
  optional_gated_dataset: nemotron-post-training-dataset-v2
  notes: >
    Start with a bounded public calibration mix for portability. For production
    Spark validation, regenerate the calibration manifest with the exact data
    mix, revisions, checksums, and sequence length used by the export.

exclusions:
  apply_recommended_keep_patterns: true
  modules:
    - lm_head
    - embed_tokens
    - embed_vision
    - vision
    - visual
    - multi_modal_projector

export:
  image: model-forge-modelopt-nvfp4:0.43.0
  dockerfile: docker/modelopt-nvfp4.Dockerfile
  base_image: vllm-node-tf5:latest
  modelopt_version: 0.43.0
  output_root: ~/models/model-forge-quantized/fp8_w8a8
  output_subdir: "{source_family}/{target_variant}"
  start_if_memory_available_above_fraction: 0.10
  stop_if_memory_available_below_fraction: 0.05
  watchdog_poll_seconds: 2
  require_disk_free_fraction: 0.15
  systemd_scope:
    enabled: true
    user: true
    CPUQuota: "80%"
    MemoryMax: "90%"
    IOWeight: 100
  docker:
    cpus: 8
    omp_num_threads: 8
    memory_gb: 96
    memory_swap_gb: 96
    shm_size_gb: 32
    nice: 10
  ptq:
    strategy: hf_ptq
    qformat: fp8
    dataset: cnn_dailymail,wikipedia
    calib_size: 64,64
    calib_seq: 2048
    batch_size: 4
    tensor_parallel: 1
    pipeline_parallel: 1
    gpu_max_mem_percentage: 0.70
    kv_cache_qformat: fp8_cast
    low_memory_mode: true
    use_seq_device_map: true
    trust_remote_code: true
    skip_generate: true

runtime:
  container: vllm-node-tf5
  host: 0.0.0.0
  port: 8017
  tensor_parallel: 2
  gpu_memory_utilization: 0.70
  max_model_len: 8192
  max_num_seqs: 4
  max_num_batched_tokens: 8192
  launch:
    spark_vllm_dir_env: MODEL_FORGE_SPARK_VLLM_DOCKER
    nodes_env: MODEL_FORGE_SPARK_CLUSTER_NODES
    container_name: model_forge_fp8_w8a8
    no_ray: true
    non_privileged: true
    mem_limit_gb: 110
    mem_swap_limit_gb: 120
    shm_size_gb: 32
  vllm_flags:
    trust_remote_code: true
    quantization: modelopt
    kv_cache_dtype: fp8
    load_format: auto

matrix:
  workers_env: MODEL_FORGE_QUANT_WORKERS
  workers: local
  variants: []

outputs:
  reports_dir: reports/generated/quantization
  models_dir: ~/models/model-forge-quantized/fp8_w8a8

evals:
  required:
    - ./forge quantize calibration-manifest <family> <variant> --config configs/quantization/fp8_w8a8_modelopt.yaml --write-manifest
    - ./forge quantize export <family> <variant> --config configs/quantization/fp8_w8a8_modelopt.yaml --execute
    - ./forge bench serve --config configs/serving/serve_bench_core.yaml --model <served_quantized_model> --base-url <base_url>
    - ./forge eval <family> <variant>_fp8_w8a8_modelopt --internal
    - ./forge quantize card --config configs/quantization/fp8_w8a8_modelopt.yaml --source-serving-summary <source>/summary.json --candidate-serving-summary <candidate>/summary.json --source-serving-eval <source_eval> --candidate-serving-eval <candidate_eval> --run-id <run_id> --write-card
  card_metrics:
    - normal_use_regression.normal_use_regression_pass_rate
    - capability_preservation_challenge.normal_use_regression_pass_rate
    - agentic_tool_use_json.schema_adherence
    - agentic_tool_use_json.workflow_success
    - refusal_paired_boundary.benign_answer_quality_rate
    - unsafe_overcompliance.unsafe_overcompliance_rate
