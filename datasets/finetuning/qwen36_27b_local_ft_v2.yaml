name: qwen36_27b_local_ft_v2
description: >
  Focused Qwen 3.6 27B repair-pass SFT blend. v1 matched base on the internal
  challenge metric and regressed paired benign quality, so this manifest
  intentionally upweights compact human-authored repair seeds instead of broad
  public volume.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 3407

source_registry: configs/data_sources/qwen36_27b_local_ft_v2.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true

sources:
  - id: qwen36_local_ft_v2_repair_seeds
    target_samples: 22
    role: qwen36_v1_gap_repair
  - id: model_forge_gemma_ft_v1_seeds
    target_samples: 37
    role: portable_model_forge_repair

holdouts:
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_code_debug.yaml
  - evals/prompts/artifact_code_generation.yaml
  - evals/prompts/artifact_web_design.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - This is a repair-pass candidate, not a broad capability pretrain substitute.
  - Promote only if it beats base/local_ft_v1 on challenge capability and restores paired benign quality.
  - Reject if it overfits response style, raises benign refusals, or regresses normal-use behavior.
