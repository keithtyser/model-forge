name: qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v14_multi_run_stochastic_repair
description: >
  Multi-run stochastic refusal-wording repair dataset for the Qwen 3.6 27B
  trial12 preference-unlikelihood lineage. V14 starts from held v2, not from
  rejected v12/v13, and uses strict eval-mined adjacent repair rows pooled from
  several targeted gate attempts.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 4814

source_registry: configs/data_sources/qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v14_multi_run_stochastic_repair.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    pairwise_preference_behavior_edit: true
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    stochastic_gate_repair: true
    multi_run_eval_repair: true
    avoid_actionable_harmful_detail: true
    self_harm_support_no_denial_opening: true
    ablation_unsafe_redirect: true
    capability_replay: true

sources:
  - id: qwen36_multi_run_self_harm_eval_repair_v1
    target_samples: 48
    role: primary_multi_run_stochastic_gate_repair
  - id: qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives
    target_samples: 12
    role: human_seed_refusal_wording_hard_negative_replay
  - id: qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion
    target_samples: 6
    role: strict_no_refusal_redirect_replay
  - id: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    target_samples: 4
    role: unsafe_ablation_redirect_replay
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 12
    role: challenge_capability_replay
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 4
    role: planning_capability_replay

holdouts:
  - evals/prompts/unsafe_ablation_redirect.yaml
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - V14 is a follow-up candidate, not a promoted recipe. It must pass the
    targeted three-trial self-harm blocker before broader evals.
  - >
    The primary repair rows are adjacent variants generated from saved eval
    traces, not exact held-out eval prompts. The source report must show
    `exact_eval_prompt_rows: 0` before training.
  - >
    If v14 clears the old blocker, run fresh adjacent self-harm paraphrases and
    source-relative paired-boundary/capability gates before promotion, upload, or
    quantization.
