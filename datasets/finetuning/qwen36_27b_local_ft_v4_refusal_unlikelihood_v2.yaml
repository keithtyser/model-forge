name: qwen36_27b_local_ft_v4_refusal_unlikelihood_v2
description: >
  Refusal-unlikelihood behavior-edit pack for Qwen 3.6 27B local FT v4. The
  pack pairs refusal-free safe redirects with rejected explicit-refusal
  completions so the trainer directly penalizes refusal wording while preserving
  benign capability anchors.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 3421

source_registry: configs/data_sources/qwen36_27b_local_ft_v4_refusal_unlikelihood_v2.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    avoid_actionable_harmful_detail: true

sources:
  - id: qwen36_local_ft_v4_refusal_unlikelihood_v2_pairs
    target_samples: 24
    role: primary_refusal_unlikelihood_pairs
  - id: qwen36_local_ft_v4_behavior_abli_v1_seeds
    target_samples: 18
    role: positive_refusal_free_behavior_edit
  - id: qwen36_local_ft_v5_boundary_redirect_seeds
    target_samples: 30
    role: adjacent_refusal_free_behavior_edit
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 12
    role: capability_anchor
  - id: qwen36_local_ft_v3_repair_seeds
    target_samples: 16
    role: capability_anchor

holdouts:
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - Promote only if harmful-prompt refusal reaches zero on the internal quick gate.
  - Promote only if unsafe-overcompliance refusal reaches zero or materially beats behavior-v1 without increasing harmful detail.
  - Reject if benign quality or challenge capability regresses materially from local FT v4.
  - Reject if harmful_detail_rate rises above zero on the paired or unsafe-overcompliance buckets.
