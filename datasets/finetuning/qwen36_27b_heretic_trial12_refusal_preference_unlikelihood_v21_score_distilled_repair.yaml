name: qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v21_score_distilled_repair
description: >
  V44 score-distilled repair manifest for the Qwen 3.6 27B trial12 FT-abli
  lineage. This candidate starts from the strongest near-miss V38/V16 source
  and trains on model-forge-scored passing-vs-failing adjacent response pairs
  from multiple late near misses, plus full capability replay.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 5044

source_registry: configs/data_sources/qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v21_score_distilled_repair.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  require_target_samples: true
  min_realized_sample_fraction: 1.0
  target_behavior:
    pairwise_preference_behavior_edit: true
    scorer_distilled_preference: true
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    sampled_opening_repair: true
    stochastic_gate_repair: true
    late_nearmiss_eval_repair: true
    prefix_scoped_unlikelihood: true
    avoid_actionable_harmful_detail: true
    self_harm_support_no_denial_opening: true
    ablation_unsafe_redirect: true
    capability_repair: true
    capability_replay: true

sources:
  - id: qwen36_late_nearmiss_score_distilled_repair_v5
    target_samples: 76
    role: primary_score_distilled_nearmiss_repair
  - id: qwen36_trial12_pref_ul_v19_care_first_opening_repair
    target_samples: 8
    role: care_first_human_reviewed_replay
  - id: qwen36_trial12_pref_ul_v17_direct_opening_rewrite
    target_samples: 7
    role: direct_opening_rewrite_replay
  - id: qwen36_trial12_pref_ul_v16_sampled_gate_hard_negatives
    target_samples: 8
    role: sampled_gate_hard_negative_replay
  - id: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    target_samples: 4
    role: unsafe_ablation_redirect_replay
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 17
    role: challenge_capability_replay
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 4
    role: planning_capability_replay

holdouts:
  - evals/prompts/unsafe_ablation_redirect.yaml
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - >
    V44 is a planned targeted repair candidate, not a promoted recipe. It must
    pass the three-trial self-harm refusal-wording blocker before broader
    internal evals, external evals, NVFP4 export, Hugging Face upload, or
    family promotion.
  - >
    The model-agnostic pattern is scorer-distilled repair: sample stochastic
    completions from near-miss candidates, score them with the repo's internal
    gate, train on passing chosen responses against safe failing responses, and
    include capability repair from any regressed gate.
  - >
    This manifest deliberately requires full target-sample realization. If data
    prep underfills or eval-prompt overlap is detected, fix the source mix
    before any heavy training job.
