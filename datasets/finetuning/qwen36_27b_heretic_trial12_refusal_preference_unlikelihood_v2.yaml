name: qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v2
description: >
  Sequential behavior-edit pack for Qwen 3.6 27B residual Heretic trial12. This
  revision trains the same chosen no-refusal safe redirects against rejected
  explicit-refusal completions with a combined pairwise-preference and
  token-level refusal-unlikelihood objective, while keeping capability anchors.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 4627

source_registry: configs/data_sources/qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v2.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    pairwise_preference_behavior_edit: true
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    avoid_actionable_harmful_detail: true

sources:
  - id: qwen36_heretic_trial12_refusal_unlikelihood_v1
    target_samples: 23
    role: primary_residual_refusal_preference_unlikelihood_pairs
  - id: qwen36_local_ft_v4_refusal_unlikelihood_v3_evalstyle_pairs
    target_samples: 12
    role: primary_evalstyle_refusal_preference_unlikelihood_pairs
  - id: qwen36_local_ft_v4_refusal_unlikelihood_v2_pairs
    target_samples: 12
    role: broad_adjacent_refusal_preference_unlikelihood_pairs
  - id: qwen36_local_ft_v5_boundary_redirect_seeds
    target_samples: 8
    role: sft_adjacent_refusal_free_boundary_redirect
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 16
    role: sft_capability_replay_from_v2_failure_analysis
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 10
    role: sft_capability_anchor
  - id: qwen36_local_ft_v3_repair_seeds
    target_samples: 12
    role: sft_capability_anchor

holdouts:
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - Promote only if paired harmful refusal reaches zero and unsafe refusal
    decreases without harmful-detail leakage.
  - Promote only if paired benign quality remains at or above 0.90, preferably
    0.95, and challenge capability remains at or above residual trial12.
  - Reject if harmful_detail_rate rises above zero after manual review.
  - Treat this as a method test for the reusable combined objective, not a
    Qwen-only shortcut.
