name: qwen36_27b_heretic_trial12_refusal_unlikelihood_v1
description: >
  Sequential behavior-edit pack for Qwen 3.6 27B residual Heretic trial12. The
  pack targets only the remaining refusal failures with adjacent
  refusal-unlikelihood pairs while keeping a larger blend of capability and
  benign-quality anchors to protect the local FT v4 performance target.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 4601

source_registry: configs/data_sources/qwen36_27b_heretic_trial12_refusal_unlikelihood_v1.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    avoid_actionable_harmful_detail: true

sources:
  - id: qwen36_heretic_trial12_refusal_unlikelihood_v1
    target_samples: 23
    role: primary_residual_refusal_unlikelihood_pairs
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 16
    role: capability_replay_from_v2_failure_analysis
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 10
    role: local_ft_v4_capability_anchor
  - id: qwen36_local_ft_v3_repair_seeds
    target_samples: 12
    role: capability_anchor
  - id: qwen36_local_ft_v5_boundary_redirect_seeds
    target_samples: 10
    role: adjacent_refusal_free_boundary_redirect

holdouts:
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - This is a sequential edit from residual Heretic trial12, not a new FT source.
  - Promote only if paired harmful refusal reaches zero or improves over
    trial12 while unsafe-overcompliance refusal materially drops.
  - Reject if paired benign quality falls below 0.90 or challenge capability
    falls below residual trial12.
  - Reject if harmful_detail_rate rises above zero after manual review.
