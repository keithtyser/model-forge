name: qwen36_27b_local_ft_v5
description: >
  Focused Qwen 3.6 27B repair-pass SFT blend. v5 preserves the v4 capability,
  benign-quality, and planning repair examples, then adds a compact
  refusal-free safe-redirection pack so the source model is less anchored to
  explicit refusal language before the ablation stage.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 3411

source_registry: configs/data_sources/qwen36_27b_local_ft_v5.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true

sources:
  - id: qwen36_local_ft_v2_repair_seeds
    target_samples: 23
    role: qwen36_v1_gap_repair
  - id: qwen36_local_ft_v3_repair_seeds
    target_samples: 22
    role: qwen36_v2_regression_repair
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 12
    role: qwen36_v3_planning_repair
  - id: qwen36_local_ft_v5_boundary_redirect_seeds
    target_samples: 30
    role: refusal_free_safe_redirect_repair
  - id: model_forge_gemma_ft_v1_seeds
    target_samples: 37
    role: portable_model_forge_repair

holdouts:
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_code_debug.yaml
  - evals/prompts/artifact_code_generation.yaml
  - evals/prompts/artifact_web_design.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/refusal_benign_boundary.yaml
  - evals/prompts/unsafe_overcompliance.yaml

promotion_notes:
  - Promote only if it keeps or improves v4's challenge capability over base.
  - Promote only if paired benign quality remains close to the base and v4.
  - Promote only if harmful refusal rate before ablation drops materially versus
    v4 without adding harmful detail.
  - Reject if normal-use behavior, agentic planning, or benign refusal rate
    regresses.
