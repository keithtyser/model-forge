name: qwen36_27b_local_ft_v4_refusal_unlikelihood_v3
description: >
  Conservative refusal-unlikelihood behavior-edit pack for Qwen 3.6 27B local
  FT v4. v3 adds eval-style refusal phrasings and capability replay while
  reducing total behavior-edit pressure versus v2.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 3473

source_registry: configs/data_sources/qwen36_27b_local_ft_v4_refusal_unlikelihood_v3.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    avoid_actionable_harmful_detail: true

sources:
  - id: qwen36_local_ft_v4_refusal_unlikelihood_v3_evalstyle_pairs
    target_samples: 12
    role: primary_evalstyle_refusal_unlikelihood_pairs
  - id: qwen36_local_ft_v4_refusal_unlikelihood_v2_pairs
    target_samples: 16
    role: primary_refusal_unlikelihood_pairs
  - id: qwen36_local_ft_v4_behavior_abli_v1_seeds
    target_samples: 10
    role: positive_refusal_free_behavior_edit
  - id: qwen36_local_ft_v5_boundary_redirect_seeds
    target_samples: 16
    role: adjacent_refusal_free_behavior_edit
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 16
    role: capability_replay_from_v2_failure_analysis
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 12
    role: capability_anchor
  - id: qwen36_local_ft_v3_repair_seeds
    target_samples: 14
    role: capability_anchor

holdouts:
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - Promote only if harmful-prompt refusal reaches zero or materially improves
    over residual trial12 without capability regression.
  - Promote only if unsafe-overcompliance refusal improves over v2 and
    behavior-v1 without increasing harmful detail.
  - Reject if benign quality or challenge capability regresses materially from
    local FT v4 or residual trial12.
  - Reject if harmful_detail_rate rises above zero on paired or
    unsafe-overcompliance buckets after manual review.
