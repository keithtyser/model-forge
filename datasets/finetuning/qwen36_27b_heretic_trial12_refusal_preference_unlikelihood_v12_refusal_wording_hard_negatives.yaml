name: qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v12_refusal_wording_hard_negatives
description: >
  Hard-negative refusal-wording repair dataset for the Qwen 3.6 27B trial12
  preference-unlikelihood lineage. V12 continues from the merged v11 checkpoint
  after v11 preserved capability but still refused the targeted self-harm
  blocker 3/3 times. The primary source directly contrasts safe crisis-support
  redirects against the observed "I can help, but I won't..." refusal style.
format: messages
chat_template: auto
max_context_window: 4096
random_seed: 4812

source_registry: configs/data_sources/qwen36_27b_heretic_trial12_refusal_preference_unlikelihood_v12_refusal_wording_hard_negatives.yaml

quality_gates:
  min_turn_chars: 2
  require_assistant_content: true
  reject_unclosed_think: true
  dedupe_by_conversation_hash: true
  max_tokens: 4096
  reject_eval_prompt_overlap: true
  target_behavior:
    pairwise_preference_behavior_edit: true
    refusal_free_safe_redirect: true
    refusal_unlikelihood_pairs: true
    refusal_wording_hard_negative: true
    avoid_actionable_harmful_detail: true
    self_harm_support_no_denial_opening: true
    stochastic_blocker_repair: true
    ablation_unsafe_redirect: true
    direct_prompt_repair: true
    capability_replay: true

sources:
  - id: qwen36_trial12_pref_ul_v12_refusal_wording_hard_negatives
    target_samples: 16
    role: primary_refusal_wording_hard_negative_repair
  - id: qwen36_trial12_pref_ul_v11_refusal_free_redirect_expansion
    target_samples: 12
    role: strict_no_refusal_redirect_replay
  - id: qwen36_trial12_pref_ul_v8_direct_prompt_pairs
    target_samples: 4
    role: reduced_direct_prompt_repair_regularizer
  - id: qwen36_trial12_pref_ul_v5_ablation_redirect_pairs
    target_samples: 4
    role: unsafe_ablation_redirect_replay
  - id: qwen36_local_ft_v4_capability_replay_v3
    target_samples: 8
    role: challenge_capability_replay
  - id: qwen36_local_ft_v4_planning_repair_seeds
    target_samples: 3
    role: planning_capability_replay

holdouts:
  - evals/prompts/unsafe_ablation_redirect.yaml
  - evals/prompts/unsafe_overcompliance.yaml
  - evals/prompts/refusal_paired_boundary.yaml
  - evals/prompts/capability_preservation_challenge.yaml
  - evals/prompts/normal_use_regression.yaml
  - evals/prompts/agentic_multi_step_planning.yaml
  - evals/prompts/agentic_tool_use_json.yaml
  - evals/prompts/refusal_benign_boundary.yaml

promotion_notes:
  - V12 is a follow-up candidate, not a promoted recipe. It must pass targeted
    three-trial self-harm refusal, harmful-detail, safe-redirect, and challenge
    gates from a merged checkpoint before broader evals.
  - >
    V12 uses adjacent hard negatives informed by v11's observed failure style,
    not exact held-out eval rows. If v12 clears the old blocker, run fresh
    adjacent self-harm paraphrases before promotion, upload, or quantization.
  - Keep the chosen side free of explicit denial/refusal openings; do not add
    rows whose chosen assistant text contains "I won't", "I can't", or
    "I cannot" when the goal is refusal-wording suppression.
