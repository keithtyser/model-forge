- id: docker_disk_safety
  role: operations_reasoning
  target_examples: 120
  rationale: v0 sometimes missed active-container cleanup constraints.
- id: sql_edge_cases
  role: data_reasoning
  target_examples: 120
  rationale: v0 missed SQL NULL wording in all trials.
- id: shell_safety
  role: developer_workflow
  target_examples: 120
  rationale: Reinforce dry-run, quoting, and non-destructive sync workflows.
- id: config_review
  role: configuration_reasoning
  target_examples: 140
  rationale: v0 missed variants and prompt-set terminology.
- id: json_schema_repair
  role: structured_output
  target_examples: 120
  rationale: Preserve schema repair and structured output behavior.
- id: git_workflow_repair
  role: developer_workflow
  target_examples: 120
  rationale: Recover reasoning-style step-count and observe/act/verify behavior.
- id: benign_safety_analysis
  role: refusal_boundary
  target_examples: 180
  rationale: Reduce over-refusal on benign eval and safety-analysis tasks.
- id: checkpoint_selection
  role: model_eval_methodology
  target_examples: 120
  rationale: Teach model-eval comparison and checkpoint-selection reasoning.
quality_thresholds:
  min_average_score: 0.7
  min_target_skill_relevance: 0.75
  max_holdout_similarity: 0.82
  min_seed_examples_per_skill: 5
  reject_license_risk:
  - high
  reject_contamination_risk:
  - high
  reject_length_violations: true
holdouts:
- evals/prompts/capability_preservation_challenge.yaml
- evals/prompts/normal_use_regression.yaml
- evals/prompts/reasoning_style_stability.yaml
- evals/prompts/agentic_multi_step_planning.yaml
- evals/prompts/refusal_paired_boundary.yaml
- evals/prompts/refusal_benign_boundary.yaml
generation_methods:
  enabled_now:
  - human_seed
  - self_instruct
  - evol_instruct
  - instruction_backtranslation
  - eval_adjacent_generation
  planned:
  - self_instruct
  - evol_instruct
  - instruction_backtranslation
  - self_code_align
  - eval_adjacent_generation
generation:
  provider:
    type: openai_compatible
    model: local/qwen35-9b-teacher
    model_env: MODEL_FORGE_DATA_GENERATOR_MODEL
    base_url: http://127.0.0.1:8011/v1
    base_url_env: MODEL_FORGE_DATA_PROVIDER_BASE_URL
    api_key_env: MODEL_FORGE_DATA_PROVIDER_API_KEY
    timeout_seconds: 120
    request:
      temperature: 0.7
      max_tokens: 650
      system_prompt: 'Create one high-quality eval-adjacent SFT row. Return only strict
        compact JSON with user and assistant keys. The assistant answer must be concise,
        concrete, correct, and within the requested word limit.

        '
  max_generated_candidates: 24
  max_seed_rows: 6
  smoke:
    max_generated_candidates: 24
    max_seed_rows: 6
  resource_limits:
    max_candidates_per_run: 80
    min_free_memory_ratio: 0.05
    min_free_disk_ratio: 0.15
  strategies:
  - name: self_instruct
    enabled: true
    variants_per_seed: 1
  - name: evol_instruct
    enabled: true
    variants_per_seed: 1
  - name: instruction_backtranslation
    enabled: true
    variants_per_seed: 1
  - name: eval_adjacent_generation
    enabled: true
    variants_per_seed: 1
review:
  sample_size: 50
  min_examples_per_skill: 5
  min_assistant_words: 35
  max_assistant_words: 260
  max_seed_similarity: 0.74
  critical_flags:
  - copied_seed_wording
  - unsafe_detail
  - poor_assistant_answer
  - too_long
seed_only: false
smoke_only: true
