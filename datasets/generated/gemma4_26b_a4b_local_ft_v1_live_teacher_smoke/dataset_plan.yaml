  checkpoint_selection: 5
  config_review: 5
  docker_disk_safety: 2
  eval_latency_throughput: 3
  git_workflow_repair: 5
  json_schema_repair: 5
  shell_safety: 5
  sql_edge_cases: 3
target_accept_count:
